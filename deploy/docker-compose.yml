# Run from repo root: docker compose -f deploy/docker-compose.yml up -d --build
# Uses ../.env (repo root) and ../secrets/ (see .env.example)

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
    volumes:
      # Same path as local: GOOGLE_SERVICE_ACCOUNT=./secrets/service-account.json
      - ../secrets:/app/api/secrets:ro
    ports:
      - '127.0.0.1:3001:3000'
    restart: unless-stopped
