# Run from repo root: docker compose -f deploy/docker-compose.yml up -d --build
# Uses ../.env and ../api-key.json (service account JSON next to .env)

name: checkin

services:
  checkin-api:
    container_name: checkin-api
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      GOOGLE_SERVICE_ACCOUNT: /app/api-key.json
    volumes:
      - ../api-key.json:/app/api-key.json:ro
    ports:
      - '127.0.0.1:3001:3000'
    restart: unless-stopped
