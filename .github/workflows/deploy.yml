name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "value=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: |
            ghcr.io/voidstackab/checkin-frontend:${{ steps.tag.outputs.value }}
            ghcr.io/voidstackab/checkin-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/voidstackab/checkin-api:${{ steps.tag.outputs.value }}
            ghcr.io/voidstackab/checkin-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger sandbox deployment
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Update version in mission-control
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MISSION_CONTROL_PAT }}
          script: |
            const tag = '${{ needs.build.outputs.image_tag }}'
            const owner = 'VoidStackAB'
            const repo = 'mission-control'
            const path = 'projects/checkin/version'

            const { data: file } = await github.rest.repos.getContent({ owner, repo, path })

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `chore: deploy checkin ${tag}`,
              content: Buffer.from(tag + '\n').toString('base64'),
              sha: file.sha,
              branch: 'master'
            })
